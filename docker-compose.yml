services:
  app:
    container_name: faragh-app
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      # keep container deps/build caches visible (not shadowed by the bind mount)
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY}
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - node_modules/
        - action: sync
          path: ./public
          target: /app/public
        - action: sync+restart
          path: ./next.config.ts
          target: /app/next.config.ts
        - action: sync+restart
          path: ./postcss.config.mjs
          target: /app/postcss.config.mjs
        - action: sync+restart
          path: ./tsconfig.json
          target: /app/tsconfig.json
        - action: rebuild
          path: package.json
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  redis:
    container_name: faragh-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30

volumes:
  redis_data:

networks:
  app-network:
    driver: bridge
