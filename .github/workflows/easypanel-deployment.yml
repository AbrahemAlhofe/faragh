name: Deploy to EasyPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger EasyPanel deploy webhook
        env:
          DEPLOY_URL: ${{ secrets.EASYPANEL_DEPLOY_WEBHOOK }}
        run: |
          set -e
          echo "Triggering EasyPanel deploy..."
          http_status=$(curl -s -o response.txt -w "%{http_code}" -X POST "$DEPLOY_URL")
          echo "HTTP Status: $http_status"
          echo "Response:"
          cat response.txt
          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "Deploy trigger failed"
            exit 1
          fi